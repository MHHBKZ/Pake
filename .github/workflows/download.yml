name: Download Artifact by ID and Commit
on:
  workflow_dispatch:

permissions:
  contents: write
  actions: read

jobs:
  download-and-commit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Download artifact using GitHub CLI
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Get artifact information
          ARTIFACT_INFO=$(gh api repos/${{ github.repository }}/actions/artifacts/6703550130)
          ARTIFACT_NAME=$(echo $ARTIFACT_INFO | jq -r '.name')
          ARTIFACT_URL=$(echo $ARTIFACT_INFO | jq -r '.archive_download_url')
          
          echo "Artifact name: $ARTIFACT_NAME"
          echo "Download URL: $ARTIFACT_URL"
          
          # Download artifact
          curl -L -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -o artifact.zip $ARTIFACT_URL
          
          # Check if download was successful
          if [ ! -f artifact.zip ] || [ ! -s artifact.zip ]; then
            echo "Failed to download artifact"
            exit 1
          fi
          
          # Extract files
          mkdir -p ./artifact-content
          unzip -o artifact.zip -d ./artifact-content
          rm artifact.zip
          
          echo "Files downloaded:"
          ls -la ./artifact-content/
          echo "Total files: $(find ./artifact-content -type f | wc -l)"
      
      - name: Commit files
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          
          # Debug: Show current directory contents
          echo "Current directory before copy:"
          ls -la
          
          # Copy artifact content to root (using explicit path)
          if [ -d "./artifact-content" ]; then
            # Copy all files including hidden ones
            cp -rf ./artifact-content/* . 2>/dev/null || true
            cp -rf ./artifact-content/.[!.]* . 2>/dev/null || true
            
            echo "Files after copy:"
            ls -la
          else
            echo "ERROR: artifact-content directory not found!"
            exit 1
          fi
          
          # Show git status
          echo "Git status before add:"
          git status
          
          # Add all files
          git add -A
          
          # Show what will be committed
          echo "Files staged for commit:"
          git diff --cached --name-only
          
          # Commit and push if there are changes
          if git diff --cached --quiet; then
            echo "No changes to commit - checking if files exist but are already committed"
            # Force add specific files if needed
            if [ -d "./artifact-content" ] && [ "$(ls -A ./artifact-content)" ]; then
              echo "Files exist but git doesn't see changes - adding forcefully"
              git add --force ./artifact-content/*
              git add --force .
            else
              echo "No files found to commit"
              exit 0
            fi
          fi
          
          # Commit with a message
          git commit -m "Add artifact 6703550130 to repository [skip ci]"
          
          # Push to current branch
          git push origin HEAD:${{ github.ref_name }}
