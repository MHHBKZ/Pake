name: Download Artifact 6703550130
on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  commit-artifact:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Download artifact
        uses: actions/github-script@v7
        with:
          script: |
            const { data: artifact } = await github.rest.actions.downloadArtifact({
              owner: context.repo.owner,
              repo: context.repo.repo,
              artifact_id: 6703550130,
              archive_format: 'zip'
            });
            
            // Save and extract artifact
            const fs = require('fs');
            const https = require('https');
            const { execSync } = require('child_process');
            
            // Download the artifact
            const file = fs.createWriteStream('artifact.zip');
            const request = https.get(artifact.url, { headers: { 'Authorization': `token ${process.env.GITHUB_TOKEN}` } }, response => {
              response.pipe(file);
              file.on('finish', () => {
                file.close();
                execSync('unzip artifact.zip -d ./artifact-content');
                execSync('cp -r ./artifact-content/* .');
              });
            });
      
      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git diff --staged --quiet || git commit -m "Add artifact 6703550130 [skip ci]"
          git push
